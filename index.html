<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>شركة تل الوديان للتجارة</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
}

/* HEADER */
header{
    background:#111827;
    color:white;
    padding:15px;
    text-align:center;
}

/* LAYOUT */
.main{
    display:flex;
    gap:20px;
    padding:20px;
}

/* LEFT PANEL */
.form-box{
    width:35%;
    background:white;
    padding:15px;
    border-radius:10px;
}

/* RIGHT PANEL */
.data-box{
    width:65%;
    background:white;
    padding:15px;
    border-radius:10px;
}

/* INPUT */
input,select{
    width:100%;
    padding:8px;
    margin:5px 0;
}

/* BUTTON */
button{
    padding:8px 12px;
    margin:5px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}

th{
    background:#1e3a8a;
    color:white;
}

img{
    width:60px;
}

/* MSG */
#msg{
    color:green;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
<h2>شركة تل الوديان للتجارة</h2>
<p>Vehicle Management System</p>
</header>

<div class="main">

<!-- FORM -->
<div class="form-box">

<h3>Admin Panel</h3>

<p id="msg"></p>

<input id="carName" placeholder="Car Name">
<input id="plate" placeholder="Plate Number">
<input id="model" placeholder="Model">
<input id="customer" placeholder="Customer Name">
<input id="phone" placeholder="Phone Number">
<input id="price" placeholder="Price with VAT">
<input id="fee" placeholder="Transfer Fee">

<select id="transfer">
<option>Yes</option>
<option>No</option>
</select>

<input id="reason" placeholder="Reason">

<input type="file" id="img">

<button onclick="save()">Save Car</button>

</div>

<!-- DATA -->
<div class="data-box">

<h3>Records</h3>

<input id="search" placeholder="Search..." onkeyup="searchData()">

<table>
<thead>
<tr>
<th>Invoice</th>
<th>Car</th>
<th>Plate</th>
<th>Customer</th>
<th>Image</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableData"></tbody>

</table>

</div>

</div>

<script>

let cars=JSON.parse(localStorage.getItem("cars"))||[];
let editIndex=-1;
let inv=cars.length+1;

/* SAVE */
function save(){

let reader=new FileReader();
let file=img.files[0];

reader.onload=function(){

let data={
invoice:"INV-"+inv++,
car:carName.value,
plate:plate.value,
customer:customer.value,
img:reader.result
};

if(editIndex===-1){
cars.push(data);
}else{
cars[editIndex]=data;
editIndex=-1;
}

localStorage.setItem("cars",JSON.stringify(cars));
msg.innerText="✔ Saved Successfully";
render();
clearForm();

};

if(file) reader.readAsDataURL(file);
else reader.onload();

}

/* RENDER */
function render(){

let html="";

cars.forEach((c,i)=>{

html+=`
<tr>
<td>${c.invoice}</td>
<td>${c.car}</td>
<td>${c.plate}</td>
<td>${c.customer}</td>
<td>${c.img?`<img src="${c.img}">`:""}</td>
<td>
<button onclick="edit(${i})">Edit</button>
<button onclick="del(${i})">Delete</button>
</td>
</tr>
`;

});

tableData.innerHTML=html;

}

/* DELETE */
function del(i){
cars.splice(i,1);
localStorage.setItem("cars",JSON.stringify(cars));
render();
}

/* EDIT */
function edit(i){

let c=cars[i];

carName.value=c.car;
plate.value=c.plate;
customer.value=c.customer;

editIndex=i;

}

/* SEARCH */
function searchData(){

let val=search.value.toLowerCase();

let filtered=cars.filter(c =>
c.invoice.toLowerCase().includes(val) ||
c.plate.toLowerCase().includes(val) ||
c.customer.toLowerCase().includes(val)
);

let html="";

filtered.forEach(c=>{
html+=`<tr><td>${c.invoice}</td><td>${c.car}</td><td>${c.plate}</td><td>${c.customer}</td></tr>`;
});

tableData.innerHTML=html;

}

/* CLEAR */
function clearForm(){
document.querySelectorAll(".form-box input").forEach(i=>i.value="");
}

/* INIT */
render();

</script>

</body>
</html>
