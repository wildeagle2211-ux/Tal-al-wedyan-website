<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شركة تل الوديان للتجارة</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#1e3c72;
    color:white;
}

/* LOGIN */
#loginPage{
    width:320px;
    margin:80px auto;
    background:white;
    color:black;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

/* APP */
.container{
    max-width:1000px;
    margin:20px auto;
    background:white;
    color:black;
    padding:20px;
    border-radius:10px;
}

/* INPUT */
input{
    width:100%;
    padding:10px;
    margin:8px 0;
}

/* BUTTON */
button{
    padding:10px;
    margin:5px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#1e40af;
}

/* CARD */
.card{
    background:#f8fafc;
    padding:15px;
    margin-top:10px;
    border-radius:8px;
    border-left:5px solid #2563eb;
}

img{
    width:120px;
    margin-top:10px;
    border-radius:6px;
}

.hidden{display:none;}

/* SUCCESS MESSAGE */
#msg{
    color:green;
    font-weight:bold;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<h2>Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p>admin / 1234</p>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="container">

<h2>شركة تل الوديان للتجارة</h2>

<!-- MESSAGE -->
<p id="msg"></p>

<!-- FORM -->
<h3>Add Car</h3>

<input id="carName" placeholder="Car Name">
<input id="plate" placeholder="Plate Number">
<input id="customer" placeholder="Customer Name">

<input id="image" type="file">

<button onclick="addCar()">Save Data</button>
<button onclick="window.print()">Print</button>

<hr>

<h3>Records</h3>

<div id="list"></div>

</div>

</div>

<script>

let cars=[];

/* LOGIN */
function login(){
if(user.value==="admin" && pass.value==="1234"){
loginPage.style.display="none";
app.style.display="block";
}else{
alert("Wrong login");
}
}

/* ADD CAR */
function addCar(){

let file=image.files[0];

if(file){

let reader=new FileReader();

reader.onload=function(){

cars.push({
name:carName.value,
plate:plate.value,
customer:customer.value,
img:reader.result
});

msg.innerText="✔ Data saved successfully";

render();

};

reader.readAsDataURL(file);

}else{

cars.push({
name:carName.value,
plate:plate.value,
customer:customer.value,
img:""
});

msg.innerText="✔ Data saved successfully";

render();

}

}

/* RENDER */
function render(){

let html="";

cars.forEach(c=>{

html+=`
<div class="card">

<p><b>Car:</b> ${c.name}</p>
<p><b>Plate:</b> ${c.plate}</p>
<p><b>Customer:</b> ${c.customer}</p>

${c.img ? `<img src="${c.img}">` : "<p>No Image</p>"}

</div>
`;

});

list.innerHTML=html;

}

</script>

</body>
</html>
