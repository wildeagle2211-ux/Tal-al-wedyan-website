<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tel Al Wadiyan - Brand & Cars</title>

<style>
body{
    margin:0;
    font-family:Arial;
    color:white;
}

/* HERO BACKGROUND */
.hero{
    width:100%;
    height:450px;
    background:url('banner.jpg') center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

/* DARK OVERLAY */
.hero::after{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

.hero h1{
    position:relative;
    z-index:2;
    font-size:32px;
    text-align:center;
}

/* CONTAINER */
.container{
    padding:30px;
    background:#0f172a;
}

.card{
    background:#111827;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

input{
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
}

button{
    padding:10px;
    background:#38bdf8;
    border:none;
    color:black;
    font-weight:bold;
    border-radius:8px;
    cursor:pointer;
}

ul{
    margin-top:15px;
}

/* PRINT */
@media print {
    .hero, button, input{
        display:none;
    }
    body{
        background:white;
        color:black;
    }
}
</style>

</head>

<body>

<!-- HERO SECTION -->
<div class="hero">
    <h1>Tel Al Wadiyan Trading Company</h1>
</div>

<div class="container">

<!-- LOGO / BRAND -->
<div class="card">
<h2>🏢 Brand Identity</h2>

<svg width="120" height="120" viewBox="0 0 320 320">
  <circle cx="160" cy="160" r="150" fill="#0f172a"/>
  <path d="M110 260 L160 60 L210 260" stroke="#38bdf8" stroke-width="10" fill="none"/>
</svg>

<p>Luxury • Trust • Innovation</p>
</div>

<!-- CAR SYSTEM -->
<div class="card">
<h2>🚗 Add Cars</h2>

<input type="text" id="carName" placeholder="Car Name">
<input type="text" id="carModel" placeholder="Model">

<br><br>

<button onclick="addCar()">Save Car</button>
<button onclick="window.print()">Print</button>

<ul id="carList"></ul>
</div>

</div>

<script>
function addCar(){
    let name = document.getElementById("carName").value;
    let model = document.getElementById("carModel").value;

    if(name === "" || model === ""){
        alert("Please enter car details");
        return;
    }

    let li = document.createElement("li");
    li.textContent = name + " - " + model;

    document.getElementById("carList").appendChild(li);

    document.getElementById("carName").value = "";
    document.getElementById("carModel").value = "";
}
</script>

</body>
</html>
