<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>شركة تل الوديان للتجارة</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* HEADER */
.header{
    text-align:center;
    padding:20px;
    background:#111827;
}

.header p{
    color:#38bdf8;
}

/* CONTACT */
.contact{
    text-align:center;
    background:#38bdf8;
    color:black;
    padding:10px;
    font-weight:bold;
}

/* CONTAINER */
.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

/* CARD */
.card{
    background:#111827;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}

/* INPUTS */
input, select{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:8px;
}

/* BUTTON */
button{
    padding:10px;
    background:#38bdf8;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    margin:5px 0;
}

/* RECORD CARD */
.record{
    background:#1f2937;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}

/* RTL */
.rtl{
    direction:rtl;
    text-align:right;
}

/* SEARCH */
.searchBox{
    margin-top:10px;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <h1>شركة تل الوديان للتجارة</h1>
    <p>Tel Al Wadiyan Trading Company</p>

    <button onclick="setLang('en')">English</button>
    <button onclick="setLang('ar')">العربية</button>
</div>

<!-- CONTACT -->
<div class="contact">
📞 +966539115111
</div>

<div class="container">

<!-- INPUT -->
<div class="card">

<h2 id="title">🚗 Car Transfer System</h2>

<input id="car" placeholder="Car Number / رقم السيارة (ا ب ت 123)">
<input id="customer" placeholder="Customer Name / اسم العميل">
<input id="phone" placeholder="Phone Number / رقم الهاتف">
<input id="fee" placeholder="Transfer Fee / رسوم النقل">

<select id="status">
    <option value="Completed">Completed / تم النقل</option>
    <option value="Pending">Pending / لم يتم النقل</option>
</select>

<input id="reason" placeholder="Reason (if not transferred) / سبب عدم النقل">

<input type="file" id="file">

<button onclick="addData()">Save Record</button>
<button onclick="window.print()">Print</button>

<!-- SEARCH BY CAR NUMBER -->
<input class="searchBox" id="search" placeholder="Search by Car Number / ا ب ت 123" onkeyup="render()">

</div>

<!-- RECORDS -->
<div id="list"></div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("cars")) || [];

render();

// ADD DATA
function addData(){

    let car = document.getElementById("car").value;
    let customer = document.getElementById("customer").value;
    let phone = document.getElementById("phone").value;
    let fee = document.getElementById("fee").value;
    let status = document.getElementById("status").value;
    let reason = document.getElementById("reason").value;

    let fileInput = document.getElementById("file");
    let file = fileInput.files.length ? fileInput.files[0].name : "";

    if(car=="" || customer=="" || phone=="" || fee==""){
        alert("Please fill all required fields");
        return;
    }

    data.push({
        car,
        customer,
        phone,
        fee,
        status,
        reason,
        file
    });

    localStorage.setItem("cars", JSON.stringify(data));

    clear();
    render();
}

// CLEAR INPUTS
function clear(){
    document.getElementById("car").value="";
    document.getElementById("customer").value="";
    document.getElementById("phone").value="";
    document.getElementById("fee").value="";
    document.getElementById("reason").value="";
    document.getElementById("file").value="";
}

// RENDER + SEARCH BY CAR NUMBER
function render(){

    let list = document.getElementById("list");
    list.innerHTML="";

    let search = document.getElementById("search").value.toLowerCase();

    data.forEach((d,i)=>{

        if(d.car.toLowerCase().includes(search)){

            list.innerHTML += `
            <div class="card record">

                🚗 <b>${d.car}</b><br>
                👤 ${d.customer}<br>
                📞 ${d.phone}<br>
                💰 ${d.fee}<br>
                📊 ${d.status}<br>
                ❗ ${d.reason || "-"}<br>
                📎 ${d.file || "No file"}<br>

                <button onclick="del(${i})">Delete</button>

            </div>
            `;
        }
    });
}

// DELETE
function del(i){
    data.splice(i,1);
    localStorage.setItem("cars", JSON.stringify(data));
    render();
}

// LANGUAGE TOGGLE
function setLang(lang){
    if(lang === "ar"){
        document.body.classList.add("rtl");
        document.getElementById("title").innerText="🚗 نظام إدارة نقل السيارات";
    }else{
        document.body.classList.remove("rtl");
        document.getElementById("title").innerText="🚗 Car Transfer System";
    }
}

</script>

</body>
</html>
