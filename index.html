<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>شركة تل الوديان للتجارة</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* HEADER */
.header{
    text-align:center;
    padding:20px;
    background:#111827;
}

.header h1{
    margin:0;
    font-size:26px;
}

.header p{
    margin:5px 0 0;
    color:#38bdf8;
}

/* CONTACT BAR */
.contact{
    text-align:center;
    background:#38bdf8;
    color:black;
    padding:10px;
    font-weight:bold;
}

/* MAIN CONTAINER */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* CARD */
.card{
    background:#111827;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
}

/* INPUTS */
input, select{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:8px;
}

/* BUTTONS */
button{
    padding:10px;
    background:#38bdf8;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
    margin-right:5px;
}

/* LIST */
ul{
    margin-top:15px;
}

/* TABLE */
table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th, td{
    border:1px solid #333;
    padding:10px;
    text-align:center;
}

th{
    background:#1f2937;
}

/* RTL SUPPORT */
.rtl{
    direction:rtl;
    text-align:right;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <h1>شركة تل الوديان للتجارة</h1>
    <p>Tel Al Wadiyan Trading Company</p>
</div>

<!-- CONTACT -->
<div class="contact">
    📞 +966539115111
</div>

<div class="container">

<!-- CAR FORM -->
<div class="card">

<h2>🚗 Car Transfer System</h2>

<input type="text" id="car" placeholder="Car Name / اسم السيارة">
<input type="text" id="customer" placeholder="Customer Name / اسم العميل">
<input type="text" id="phone" placeholder="Phone Number / رقم الهاتف">
<input type="number" id="fee" placeholder="Transfer Fee / رسوم النقل">

<select id="status">
    <option value="Completed">Completed / تم النقل</option>
    <option value="Pending">Pending / لم يتم النقل</option>
</select>

<button onclick="addData()">Add Record</button>
<button onclick="window.print()">Print</button>

<table>
<thead>
<tr>
<th>Car</th>
<th>Customer</th>
<th>Phone</th>
<th>Fee</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tableData"></tbody>

</table>

</div>

</div>

<script>

// DATA STORAGE
let data = JSON.parse(localStorage.getItem("cars")) || [];

render();

// ADD DATA
function addData(){

    let car = document.getElementById("car").value;
    let customer = document.getElementById("customer").value;
    let phone = document.getElementById("phone").value;
    let fee = document.getElementById("fee").value;
    let status = document.getElementById("status").value;

    if(car=="" || customer=="" || phone=="" || fee==""){
        alert("Please fill all fields");
        return;
    }

    data.push({
        car,
        customer,
        phone,
        fee,
        status
    });

    localStorage.setItem("cars", JSON.stringify(data));

    render();

    document.getElementById("car").value="";
    document.getElementById("customer").value="";
    document.getElementById("phone").value="";
    document.getElementById("fee").value="";
}

// RENDER TABLE
function render(){

    let table = document.getElementById("tableData");
    table.innerHTML="";

    data.forEach(item=>{
        table.innerHTML += `
        <tr>
            <td>${item.car}</td>
            <td>${item.customer}</td>
            <td>${item.phone}</td>
            <td>${item.fee}</td>
            <td>${item.status}</td>
        </tr>
        `;
    });
}

</script>

</body>
</html>
