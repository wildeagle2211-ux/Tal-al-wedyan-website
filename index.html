<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Car Transfer System Pro</title>

<style>
body{
    font-family:Arial;
    margin:0;
    padding:20px;
    background:#0f172a;
    color:white;
}

#loginBox{
    position:fixed;
    inset:0;
    background:#000000ee;
    display:flex;
    justify-content:center;
    align-items:center;
}

.loginCard{
    background:#111827;
    padding:20px;
    border-radius:10px;
    width:300px;
}

.container{max-width:1000px;margin:auto;}
.card{background:#111827;padding:20px;border-radius:12px;}

input, select{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:none;
}

button{
    padding:10px;
    background:#38bdf8;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    margin:5px;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th, td{
    border:1px solid #333;
    padding:10px;
    text-align:center;
}

th{background:#1f2937;}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <div class="loginCard">
        <h3>Login</h3>
        <input type="password" id="pass" placeholder="Password">
        <button onclick="login()">Login</button>
        <button onclick="changePassword()">Change Password</button>
    </div>
</div>

<div class="container">
<div class="card">

<h2 style="text-align:center;">🚗 Car Transfer System</h2>

<!-- FORM -->
<input type="text" id="car" placeholder="Car Name">
<input type="text" id="plate" placeholder="Plate">
<input type="text" id="customer" placeholder="Customer">
<input type="text" id="phone" placeholder="Phone">
<input type="number" id="fee" placeholder="Fee">
<input type="text" id="reason" placeholder="Reason">

<select id="status">
    <option value="Completed">Completed</option>
    <option value="Pending">Pending</option>
</select>

<input type="file" id="file">

<button onclick="addData()">Add</button>
<button onclick="saveData()">Save</button>

<table>
<thead>
<tr>
<th>Car</th>
<th>Plate</th>
<th>Customer</th>
<th>Phone</th>
<th>Fee</th>
<th>Status</th>
<th>Reason</th>
<th>File</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableData"></tbody>
</table>

</div>
</div>

<script>

/* ===== DATA LOAD FIX ===== */
let data = [];

function loadData(){
    let stored = localStorage.getItem("cars");
    if(stored){
        try{
            data = JSON.parse(stored);
        }catch(e){
            data = [];
        }
    }
}

let password = localStorage.getItem("pass") || "1234";

/* ===== INIT ===== */
window.onload = function(){
    loadData();
    render();
};

/* ===== LOGIN ===== */
function login(){
    let p = document.getElementById("pass").value;

    if(p === password){
        document.getElementById("loginBox").style.display="none";
    }else{
        alert("Wrong Password");
    }
}

/* ===== PASSWORD CHANGE ===== */
function changePassword(){
    let old = prompt("Old Password?");
    if(old !== password){
        alert("Wrong");
        return;
    }

    let np = prompt("New Password?");
    if(np){
        password = np;
        localStorage.setItem("pass", np);
        alert("Changed ✔");
    }
}

/* ===== ADD DATA ===== */
function addData(){

    let car = document.getElementById("car").value;
    let plate = document.getElementById("plate").value;
    let customer = document.getElementById("customer").value;
    let phone = document.getElementById("phone").value;
    let fee = document.getElementById("fee").value;
    let reason = document.getElementById("reason").value;
    let status = document.getElementById("status").value;

    let fileInput = document.getElementById("file");
    let fileName = fileInput.files.length ? fileInput.files[0].name : "";

    if(!car || !plate || !customer || !phone || !fee){
        alert("Fill all fields");
        return;
    }

    data.push({
        id: Date.now(),
        car,
        plate,
        customer,
        phone,
        fee,
        status,
        reason,
        file:fileName
    });

    render();

    document.getElementById("car").value="";
    document.getElementById("plate").value="";
    document.getElementById("customer").value="";
    document.getElementById("phone").value="";
    document.getElementById("fee").value="";
    document.getElementById("reason").value="";
    document.getElementById("file").value="";
}

/* ===== SAVE ===== */
function saveData(){
    localStorage.setItem("cars", JSON.stringify(data));
    alert("Saved ✔");
}

/* ===== DELETE ===== */
function deleteData(id){
    data = data.filter(x => x.id !== id);
    render();
}

/* ===== EDIT ===== */
function editData(id){
    let item = data.find(x => x.id === id);
    if(!item) return;

    document.getElementById("car").value = item.car;
    document.getElementById("plate").value = item.plate;
    document.getElementById("customer").value = item.customer;
    document.getElementById("phone").value = item.phone;
    document.getElementById("fee").value = item.fee;
    document.getElementById("reason").value = item.reason;

    data = data.filter(x => x.id !== id);
    render();
}

/* ===== RENDER ===== */
function render(){

    let table = document.getElementById("tableData");
    table.innerHTML="";

    data.forEach(item=>{
        table.innerHTML += `
        <tr>
            <td>${item.car}</td>
            <td>${item.plate}</td>
            <td>${item.customer}</td>
            <td>${item.phone}</td>
            <td>${item.fee}</td>
            <td>${item.status}</td>
            <td>${item.reason || "-"}</td>
            <td>${item.file ? item.file : "-"}</td>
            <td>
                <button onclick="editData(${item.id})">Edit</button>
                <button onclick="deleteData(${item.id})">Delete</button>
            </td>
        </tr>
        `;
    });

    // AUTO SAVE SAFE SYNC
    localStorage.setItem("cars", JSON.stringify(data));
}

</script>

</body>
</html>
