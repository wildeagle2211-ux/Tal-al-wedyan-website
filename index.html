<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tal Al Wedyan - Pro System</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* LOGIN */
#loginBox{
    position:fixed;
    inset:0;
    background:#000000ee;
    display:flex;
    justify-content:center;
    align-items:center;
}

.loginCard{
    background:#111827;
    padding:20px;
    border-radius:10px;
    width:300px;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.card{
    background:#111827;
    padding:20px;
    border-radius:12px;
}

input, select{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    border:none;
}

button{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#38bdf8;
    font-weight:bold;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th, td{
    border:1px solid #333;
    padding:10px;
    text-align:center;
}

th{
    background:#1f2937;
}

img{
    max-width:60px;
    border-radius:6px;
}

.searchBox{
    margin:10px 0;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <div class="loginCard">
        <h3>Admin Login</h3>
        <input type="password" id="pass" placeholder="Enter Password">
        <button onclick="login()">Login</button>
    </div>
</div>

<div class="container">
<div class="card">

<h2 style="text-align:center;">🚗 Tal Al Wedyan PRO SYSTEM</h2>

<input class="searchBox" type="text" id="search" onkeyup="render()" placeholder="Search...">

<input type="text" id="car" placeholder="Car Name">
<input type="text" id="plate" placeholder="Plate Number">
<input type="text" id="customer" placeholder="Customer Name">
<input type="text" id="phone" placeholder="Phone">
<input type="number" id="fee" placeholder="Fee">
<input type="text" id="reason" placeholder="Reason">

<select id="status">
    <option value="Completed">Completed</option>
    <option value="Pending">Pending</option>
</select>

<input type="file" id="file">

<button onclick="addData()">Add</button>

<table>
<thead>
<tr>
<th>Car</th>
<th>Plate</th>
<th>Customer</th>
<th>Phone</th>
<th>Fee</th>
<th>Status</th>
<th>Reason</th>
<th>Image</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableData"></tbody>
</table>

</div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("cars")) || [];
let password = localStorage.getItem("pass") || "1234";

/* LOGIN */
function login(){
    let p = document.getElementById("pass").value;
    if(p === password){
        document.getElementById("loginBox").style.display="none";
    } else {
        alert("Wrong Password");
    }
}

/* ADD */
function addData(){

    let car = document.getElementById("car").value;
    let plate = document.getElementById("plate").value;
    let customer = document.getElementById("customer").value;
    let phone = document.getElementById("phone").value;
    let fee = document.getElementById("fee").value;
    let reason = document.getElementById("reason").value;
    let status = document.getElementById("status").value;
    let file = document.getElementById("file").files[0];

    if(!car || !plate){
        alert("Fill required fields");
        return;
    }

    if(file){
        let reader = new FileReader();
        reader.onload = function(e){
            saveItem(e.target.result);
        }
        reader.readAsDataURL(file);
    } else {
        saveItem(null);
    }

    function saveItem(img){
        data.push({
            id:Date.now(),
            car, plate, customer, phone, fee, reason, status,
            file:img
        });

        localStorage.setItem("cars", JSON.stringify(data));
        clear();
        render();
    }
}

/* DELETE */
function del(id){
    data = data.filter(x=>x.id !== id);
    localStorage.setItem("cars", JSON.stringify(data));
    render();
}

/* CLEAR */
function clear(){
    document.getElementById("car").value="";
    document.getElementById("plate").value="";
    document.getElementById("customer").value="";
    document.getElementById("phone").value="";
    document.getElementById("fee").value="";
    document.getElementById("reason").value="";
    document.getElementById("file").value="";
}

/* RENDER */
function render(){

    let search = document.getElementById("search")?.value || "";

    let table = document.getElementById("tableData");
    table.innerHTML="";

    data
    .filter(item =>
        item.car.includes(search) ||
        item.plate.includes(search) ||
        item.customer?.includes(search)
    )
    .forEach(item=>{
        table.innerHTML += `
        <tr>
            <td>${item.car}</td>
            <td>${item.plate}</td>
            <td>${item.customer || "-"}</td>
            <td>${item.phone || "-"}</td>
            <td>${item.fee || "-"}</td>
            <td>${item.status}</td>
            <td>${item.reason || "-"}</td>
            <td>${item.file ? `<img src="${item.file}">` : "-"}</td>
            <td>
                <button onclick="del(${item.id})">Delete</button>
            </td>
        </tr>
        `;
    });
}

render();

</script>

</body>
</html>
