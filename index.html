<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tal Al Wedyan - Car System</title>

<style>
body{
    font-family:Arial;
    margin:0;
    padding:20px;
    background:#0f172a;
    color:white;
}

.container{max-width:1000px;margin:auto;}
.card{background:#111827;padding:20px;border-radius:12px;}

input, select{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:none;
}

button{
    padding:10px;
    background:#38bdf8;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    margin:5px;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th, td{
    border:1px solid #333;
    padding:10px;
    text-align:center;
}

th{background:#1f2937;}

img{
    max-width:70px;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2 style="text-align:center;">🚗 Tal Al Wedyan Car System</h2>

<!-- FORM -->
<input type="text" id="car" placeholder="Car Name">
<input type="text" id="plate" placeholder="Plate Number">
<input type="text" id="customer" placeholder="Customer Name">
<input type="text" id="phone" placeholder="Phone">
<input type="number" id="fee" placeholder="Fee">
<input type="text" id="reason" placeholder="Reason">

<select id="status">
    <option value="Completed">Completed</option>
    <option value="Pending">Pending</option>
</select>

<input type="file" id="file">

<button onclick="addData()">Add Record</button>
<button onclick="window.print()">Print All</button>

<table>
<thead>
<tr>
<th>Car</th>
<th>Plate</th>
<th>Customer</th>
<th>Phone</th>
<th>Fee</th>
<th>Status</th>
<th>Reason</th>
<th>Image</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableData"></tbody>
</table>

</div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("cars")) || [];

/* ADD DATA */
function addData(){

    let car = document.getElementById("car").value;
    let plate = document.getElementById("plate").value;
    let customer = document.getElementById("customer").value;
    let phone = document.getElementById("phone").value;
    let fee = document.getElementById("fee").value;
    let reason = document.getElementById("reason").value;
    let status = document.getElementById("status").value;
    let fileInput = document.getElementById("file");

    if(!car || !plate || !customer || !phone || !fee){
        alert("Fill all fields");
        return;
    }

    let file = fileInput.files[0];

    if(file){
        let reader = new FileReader();

        reader.onload = function(e){
            data.push({
                id: Date.now(),
                car,
                plate,
                customer,
                phone,
                fee,
                status,
                reason,
                file: e.target.result
            });

            save();
            render();
        };

        reader.readAsDataURL(file);
    } else {
        data.push({
            id: Date.now(),
            car,
            plate,
            customer,
            phone,
            fee,
            status,
            reason,
            file: null
        });

        save();
        render();
    }

    document.getElementById("car").value="";
    document.getElementById("plate").value="";
    document.getElementById("customer").value="";
    document.getElementById("phone").value="";
    document.getElementById("fee").value="";
    document.getElementById("reason").value="";
    document.getElementById("file").value="";
}

/* SAVE */
function save(){
    localStorage.setItem("cars", JSON.stringify(data));
}

/* DELETE */
function del(id){
    data = data.filter(x => x.id !== id);
    save();
    render();
}

/* RENDER */
function render(){

    let table = document.getElementById("tableData");
    table.innerHTML = "";

    data.forEach(item=>{
        table.innerHTML += `
        <tr>
            <td>${item.car}</td>
            <td>${item.plate}</td>
            <td>${item.customer}</td>
            <td>${item.phone}</td>
            <td>${item.fee}</td>
            <td>${item.status}</td>
            <td>${item.reason}</td>
            <td>${item.file ? `<img src="${item.file}">` : "-"}</td>
            <td><button onclick="del(${item.id})">Delete</button></td>
        </tr>
        `;
    });
}

render();

</script>

</body>
</html>
