<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Car Transfer System Pro</title>

<!-- PDF LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    font-family:Arial;
    margin:0;
    padding:20px;
    background:#0f172a;
    color:white;
}

#loginBox{
    position:fixed;
    inset:0;
    background:#000000ee;
    display:flex;
    justify-content:center;
    align-items:center;
}

.loginCard{
    background:#111827;
    padding:20px;
    border-radius:10px;
    width:300px;
}

.container{max-width:1000px;margin:auto;}
.card{background:#111827;padding:20px;border-radius:12px;}

input, select{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:none;
}

button{
    padding:10px;
    background:#38bdf8;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    margin:5px;
}

.dashboard{
    display:flex;
    justify-content:space-between;
    background:#1f2937;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}

table{
    width:100%;
    margin-top:15px;
    border-collapse:collapse;
}

th, td{
    border:1px solid #333;
    padding:10px;
    text-align:center;
}

th{background:#1f2937;}

.tabs button{background:#1f2937;}
.active{background:#38bdf8 !important;}

@media print{
    body{background:white;color:black;}
    button, #loginBox, .tabs{display:none !important;}
    .card{background:white;color:black;}
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <div class="loginCard">
        <h3>🔐 Login</h3>
        <p>Hint: Default password 1234</p>
        <input type="password" id="pass" placeholder="Enter Password">
        <button onclick="login()">Login</button>
    </div>
</div>

<div class="container">

<div class="card">

<h2>🚗 Car Transfer System Pro</h2>

<button onclick="changePassword()">Change Password</button>
<button onclick="window.print()">Print Invoice</button>
<button onclick="downloadPDF()">Download PDF</button>

<!-- DASHBOARD -->
<div class="dashboard">
    <div>Total Records: <span id="total">0</span></div>
    <div>Total Earnings: <span id="earnings">0</span> SAR</div>
</div>

<!-- TABS -->
<div class="tabs">
    <button onclick="setTab('all')" class="active">All</button>
    <button onclick="setTab('Completed')">Transferred Done</button>
    <button onclick="setTab('Pending')">Pending</button>
</div>

<!-- FORM -->
<input type="text" id="car" placeholder="Car Name">
<input type="text" id="customer" placeholder="Customer Name">
<input type="text" id="phone" placeholder="Phone Number">
<input type="number" id="fee" placeholder="Transfer Fee">

<select id="status">
    <option value="Completed">Completed</option>
    <option value="Pending">Pending</option>
</select>

<button onclick="addData()">Add Record</button>

<!-- INVOICE AREA -->
<div id="invoiceArea">

<table>
<thead>
<tr>
<th>#</th>
<th>Car</th>
<th>Customer</th>
<th>Phone</th>
<th>Fee</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tableData"></tbody>
</table>

</div>

</div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("cars")) || [];
let password = localStorage.getItem("pass") || "1234";
let tab = "all";

// LOGIN
function login(){
    let p = document.getElementById("pass").value;
    if(p === password){
        document.getElementById("loginBox").style.display="none";
    }else{
        alert("Wrong Password");
    }
}

// CHANGE PASSWORD
function changePassword(){
    let old = prompt("Enter old password");
    if(old === password){
        let newp = prompt("Enter new password");
        if(newp){
            password = newp;
            localStorage.setItem("pass",newp);
            alert("Password Updated");
        }
    }else{
        alert("Wrong Password");
    }
}

// TAB
function setTab(t){
    tab = t;
    document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
    event.target.classList.add("active");
    render();
}

// ADD DATA
function addData(){

    let car = document.getElementById("car").value;
    let customer = document.getElementById("customer").value;
    let phone = document.getElementById("phone").value;
    let fee = document.getElementById("fee").value;
    let status = document.getElementById("status").value;

    if(!car||!customer||!phone||!fee){
        alert("Fill all fields");
        return;
    }

    let invoice = data.length ? Math.max(...data.map(d=>d.invoice))+1 : 1;

    data.push({invoice,car,customer,phone,fee,status});
    localStorage.setItem("cars",JSON.stringify(data));

    render();

    document.getElementById("car").value="";
    document.getElementById("customer").value="";
    document.getElementById("phone").value="";
    document.getElementById("fee").value="";
}

// RENDER
function render(){

    let table = document.getElementById("tableData");
    table.innerHTML="";

    let filtered = data;

    if(tab!=="all"){
        filtered = data.filter(i=>i.status===tab);
    }

    let total = filtered.length;
    let earnings = 0;

    filtered.forEach(item=>{
        if(item.status==="Completed"){
            earnings += Number(item.fee);
        }

        table.innerHTML += `
        <tr>
            <td>${item.invoice}</td>
            <td>${item.car}</td>
            <td>${item.customer}</td>
            <td>${item.phone}</td>
            <td>${item.fee}</td>
            <td>${item.status}</td>
        </tr>`;
    });

    document.getElementById("total").innerText = total;
    document.getElementById("earnings").innerText = earnings;
}

// PDF EXPORT
function downloadPDF(){

    const { jsPDF } = window.jspdf;

    html2canvas(document.getElementById("invoiceArea")).then(canvas=>{

        let img = canvas.toDataURL("image/png");

        let pdf = new jsPDF("p","mm","a4");

        let w = 190;
        let h = canvas.height * w / canvas.width;

        pdf.addImage(img,"PNG",10,10,w,h);
        pdf.save("Car_Transfer_Invoice.pdf");
    });
}

render();

</script>

</body>
</html>
