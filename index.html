<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>شركة تل الوديان للتجارة</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f172a,#1e3c72,#2a5298);
    color:white;
}

.container{
    max-width:1100px;
    margin:20px auto;
    background:white;
    color:black;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

header{
    text-align:center;
    padding:20px;
    background:#111827;
    color:white;
    border-radius:10px;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#2563eb;
    color:white;
}

button:hover{
    background:#1e40af;
}

input,select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

.card{
    border:1px solid #ddd;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
    background:#f9fafb;
}

.hidden{display:none;}

nav{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
}

</style>

</head>

<body id="body">

<!-- LOGIN -->

<div id="loginPage" class="container" style="text-align:center;">

<h2 id="loginText">Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="toggleLang()">AR / EN</button>

<p>admin / 1234</p>

</div>

<!-- APP -->

<div id="app" class="hidden">

<header>

<h1>شركة تل الوديان للتجارة</h1>
<p>Vehicle Management System</p>

</header>

<nav>

<button onclick="show('admin')">Admin</button>
<button onclick="show('records')">Records</button>
<button onclick="logout()">Logout</button>

</nav>

<div class="container">

<!-- ADMIN -->

<div id="admin">

<h2>Admin Panel</h2>

<h3 id="invBox">Invoice System</h3>

<input id="carName" placeholder="Car Name">
<input id="plate" placeholder="Plate Number">
<input id="model" placeholder="Model">
<input id="customer" placeholder="Customer Name">
<input id="phone" placeholder="Phone Number">
<input id="price" placeholder="Price (VAT)">
<input id="fee" placeholder="Transfer Fee">

<select id="transfer">
<option>Yes</option>
<option>No</option>
</select>

<input id="reason" placeholder="Reason if No">

<input id="doc" type="file">

<button onclick="addCar()">Save Car</button>

</div>

<!-- RECORDS -->

<div id="records" class="hidden">

<h2>Car Records</h2>

<button onclick="window.print()">Print</button>
<button onclick="savePDF()">PDF</button>

<div id="list"></div>

</div>

</div>

</div>

<script>

let cars=[];
let inv=1;
let edit=-1;
let lang="en";

function login(){

if(user.value==="admin" && pass.value==="1234"){

loginPage.classList.add("hidden");
app.classList.remove("hidden");

}else{
alert("Wrong login");
}

}

function logout(){
location.reload();
}

function show(id){

document.querySelectorAll(".container > div")
.forEach(d=>d.classList.add("hidden"));

document.getElementById(id).classList.remove("hidden");

render();

}

function addCar(){

let code="INV-"+String(inv).padStart(2,'0');

let car={

invoice:code,
name:carName.value,
plate:plate.value,
model:model.value,
customer:customer.value,
phone:phone.value,
price:price.value,
fee:fee.value,
transfer:transfer.value,
reason:reason.value,
doc:doc.files[0]?.name||""

};

if(edit===-1){
cars.push(car);
inv++;
}else{
cars[edit]=car;
edit=-1;
}

render();

}

function render(){

let html="";

cars.forEach((c,i)=>{

html+=`

<div class="card">

<h3>${c.invoice}</h3>

<p>Car: ${c.name}</p>
<p>Plate: ${c.plate}</p>
<p>Model: ${c.model}</p>
<p>Customer: ${c.customer}</p>
<p>Phone: ${c.phone}</p>
<p>Price: ${c.price}</p>
<p>Fee: ${c.fee}</p>
<p>Transfer: ${c.transfer}</p>
<p>Reason: ${c.reason}</p>
<p>Document: ${c.doc}</p>

<button onclick="editCar(${i})">Edit</button>
<button onclick="deleteCar(${i})">Delete</button>

</div>

`;

});

list.innerHTML=html;

}

function deleteCar(i){
cars.splice(i,1);
render();
}

function editCar(i){

let c=cars[i];

carName.value=c.name;
plate.value=c.plate;
model.value=c.model;
customer.value=c.customer;
phone.value=c.phone;
price.value=c.price;
fee.value=c.fee;
transfer.value=c.transfer;
reason.value=c.reason;

edit=i;
show('admin');

}

function savePDF(){

let w=window.open();

w.document.write("<h1>Company Invoice Report</h1>"+list.innerHTML);

w.print();

}

function toggleLang(){

if(lang==="en"){

document.body.style.direction="rtl";
loginText.innerText="تسجيل الدخول";
lang="ar";

}else{

document.body.style.direction="ltr";
loginText.innerText="Login";
lang="en";

}

}

</script>

</body>
</html>
