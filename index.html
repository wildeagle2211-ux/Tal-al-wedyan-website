<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>شركة تل الوديان للتجارة</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Roboto', sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e3c72,#2563eb);
}

/* LOGIN */
#loginPage{
    width:350px;
    margin:80px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1e40af;
}

/* HEADER */
header{
    background:#0f172a;
    color:white;
    text-align:center;
    padding:20px;
}

/* NAV */
nav{
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
    background:white;
    flex-wrap:wrap;
}

nav button{
    width:auto;
    padding:8px 15px;
}

/* CONTAINER */
.container{
    max-width:1100px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:12px;
}

/* CARD */
.card{
    background:#f8fafc;
    border-left:5px solid #2563eb;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
}

/* HIDDEN */
.hidden{display:none;}

h2{
    color:#0f172a;
}

</style>

</head>

<body id="body">

<!-- LOGIN -->
<div id="loginPage">

<h2 id="loginText">Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="toggleLang()">AR / EN</button>

<p style="font-size:12px;color:gray;">admin / 1234</p>

</div>

<!-- APP -->
<div id="app" class="hidden">

<header>
<h1>شركة تل الوديان للتجارة</h1>
<p>Vehicle Management System</p>
</header>

<nav>
<button onclick="show('admin')">Admin</button>
<button onclick="show('records')">Records</button>
<button onclick="logout()">Logout</button>
</nav>

<div class="container">

<!-- ADMIN -->
<div id="admin">

<h2 id="invBox">Invoice System</h2>

<input id="carName" placeholder="Car Name">
<input id="plate" placeholder="Plate Number">
<input id="model" placeholder="Model">
<input id="customer" placeholder="Customer Name">
<input id="phone" placeholder="Phone Number">
<input id="price" placeholder="Price (VAT)">
<input id="fee" placeholder="Transfer Fee">

<select id="transfer">
<option>Yes</option>
<option>No</option>
</select>

<input id="reason" placeholder="Reason if No">

<input id="doc" type="file">

<button onclick="addCar()">Save Car</button>

</div>

<!-- RECORDS -->
<div id="records" class="hidden">

<h2>Car Records</h2>

<button onclick="window.print()">Print</button>
<button onclick="savePDF()">PDF</button>

<div id="list"></div>

</div>

</div>

</div>

<script>

let cars=[];
let inv=1;
let edit=-1;
let lang="en";

/* LOGIN */
function login(){

if(user.value==="admin" && pass.value==="1234"){
loginPage.classList.add("hidden");
app.classList.remove("hidden");
show('admin');
}else{
alert("Wrong login");
}

}

/* LOGOUT */
function logout(){
location.reload();
}

/* SHOW */
function show(id){

document.querySelectorAll("#app > div")
.forEach(d=>d.classList.add("hidden"));

document.getElementById(id).classList.remove("hidden");

render();

}

/* ADD CAR */
function addCar(){

let code="INV-"+String(inv).padStart(2,'0');

let car={
invoice:code,
name:carName.value,
plate:plate.value,
model:model.value,
customer:customer.value,
phone:phone.value,
price:price.value,
fee:fee.value,
transfer:transfer.value,
reason:reason.value,
doc:doc.files[0]?.name||""
};

if(edit===-1){
cars.push(car);
inv++;
}else{
cars[edit]=car;
edit=-1;
}

render();

}

/* RENDER */
function render(){

let html="";

cars.forEach((c,i)=>{

html+=`
<div class="card">

<h3>${c.invoice}</h3>

<p><b>Car:</b> ${c.name}</p>
<p><b>Plate:</b> ${c.plate}</p>
<p><b>Model:</b> ${c.model}</p>
<p><b>Customer:</b> ${c.customer}</p>
<p><b>Phone:</b> ${c.phone}</p>
<p><b>Price:</b> ${c.price}</p>
<p><b>Fee:</b> ${c.fee}</p>
<p><b>Transfer:</b> ${c.transfer}</p>
<p><b>Reason:</b> ${c.reason}</p>
<p><b>Doc:</b> ${c.doc}</p>

<button onclick="editCar(${i})">Edit</button>
<button onclick="deleteCar(${i})">Delete</button>

</div>
`;

});

list.innerHTML=html;

}

/* DELETE */
function deleteCar(i){
cars.splice(i,1);
render();
}

/* EDIT */
function editCar(i){

let c=cars[i];

carName.value=c.name;
plate.value=c.plate;
model.value=c.model;
customer.value=c.customer;
phone.value=c.phone;
price.value=c.price;
fee.value=c.fee;
transfer.value=c.transfer;
reason.value=c.reason;

edit=i;
show('admin');

}

/* PDF */
function savePDF(){
let w=window.open();
w.document.write(list.innerHTML);
w.print();
}

/* LANGUAGE */
function toggleLang(){

if(lang==="en"){

lang="ar";
document.body.style.direction="rtl";
loginText.innerText="تسجيل الدخول";
invBox.innerText="نظام الفواتير";

carName.placeholder="اسم السيارة";
plate.placeholder="رقم اللوحة";
model.placeholder="الموديل";
customer.placeholder="اسم العميل";
phone.placeholder="رقم الهاتف";
price.placeholder="السعر شامل الضريبة";
fee.placeholder="رسوم النقل";
reason.placeholder="السبب";

}else{

lang="en";
document.body.style.direction="ltr";
loginText.innerText="Login";
invBox.innerText="Invoice System";

carName.placeholder="Car Name";
plate.placeholder="Plate Number";
model.placeholder="Model";
customer.placeholder="Customer Name";
phone.placeholder="Phone Number";
price.placeholder="Price (VAT)";
fee.placeholder="Transfer Fee";
reason.placeholder="Reason if No";

}

}

</script>

</body>
</html>
