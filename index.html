<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>شركة تل الوديان للتجارة</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
}

/* LOGIN */
#loginPage{
    width:360px;
    margin:80px auto;
    background:white;
    padding:20px;
    border-radius:12px;
    text-align:center;
}

/* INPUT */
input,select{
    width:100%;
    padding:10px;
    margin:8px 0;
}

/* BUTTON */
button{
    padding:10px;
    margin:5px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

/* MAIN */
.container{
    max-width:1100px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:12px;
}

/* HEADER */
header{
    text-align:center;
    background:#111827;
    color:white;
    padding:15px;
    border-radius:10px;
}

/* CARD */
.card{
    position:relative;
    background:#f8fafc;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
    border-left:5px solid #2563eb;
    overflow:hidden;
}

/* WATERMARK */
.card::after{
    content:"شركة تل الوديان للتجارة";
    position:absolute;
    font-size:28px;
    color:rgba(0,0,0,0.05);
    transform:rotate(-20deg);
    top:40%;
    left:10%;
}

/* IMAGE */
img{
    width:120px;
    margin-top:10px;
    border-radius:6px;
}

/* PRINT STYLE */
@media print{

    body{
        background:white;
    }

    button, input, select{
        display:none;
    }

    .card{
        break-inside:avoid;
    }

}

.hidden{display:none;}

</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginPage">

<h2>Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<!-- APP -->
<div id="app" class="hidden">

<header>
<h1>شركة تل الوديان للتجارة</h1>
<p>Vehicle Management System</p>
</header>

<div class="container">

<!-- ADMIN -->
<div id="admin">

<h2>Add Car</h2>

<input id="carName" placeholder="Car Name">
<input id="plate" placeholder="Plate Number">
<input id="model" placeholder="Model">
<input id="customer" placeholder="Customer Name">
<input id="phone" placeholder="Phone">
<input id="price" placeholder="Price VAT">
<input id="fee" placeholder="Transfer Fee">

<input id="image" type="file">

<button onclick="addCar()">Save Car</button>

</div>

<!-- RECORDS -->
<div id="records" class="hidden">

<h2>Car Records</h2>

<button onclick="window.print()">Print Invoice</button>

<div id="list"></div>

</div>

</div>

</div>

<script>

let cars=[];
let inv=1;

/* LOGIN */
function login(){

if(user.value==="admin" && pass.value==="1234"){
loginPage.classList.add("hidden");
app.classList.remove("hidden");
show('admin');
}else{
alert("Wrong login");
}

}

/* SHOW */
function show(id){

admin.classList.add("hidden");
records.classList.add("hidden");

document.getElementById(id).classList.remove("hidden");

render();

}

/* ADD CAR */
function addCar(){

let code="INV-"+String(inv++).padStart(2,'0');

let car={
invoice:code,
name:carName.value,
plate:plate.value,
model:model.value,
customer:customer.value,
phone:phone.value,
price:price.value,
fee:fee.value,
img:image.files[0] ? URL.createObjectURL(image.files[0]) : ""
};

cars.push(car);
render();

}

/* RENDER */
function render(){

let html="";

cars.forEach((c,i)=>{

html+=`
<div class="card">

<h2>${c.invoice}</h2>

<p><b>Car:</b> ${c.name}</p>
<p><b>Plate:</b> ${c.plate}</p>
<p><b>Model:</b> ${c.model}</p>
<p><b>Customer:</b> ${c.customer}</p>
<p><b>Phone:</b> ${c.phone}</p>
<p><b>Price:</b> ${c.price}</p>
<p><b>Fee:</b> ${c.fee}</p>

${c.img ? `<img src="${c.img}">` : ""}

<div id="qr${i}"></div>

<button onclick="makeQR('${c.invoice}','qr${i}')">Generate QR</button>

</div>
`;

});

list.innerHTML=html;

}

/* QR */
function makeQR(text,id){

document.getElementById(id).innerHTML="";

new QRCode(document.getElementById(id),{
text:text,
width:100,
height:100
});

}

</script>

</body>
</html>
